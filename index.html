<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alamin Notices | Official Portal</title>
  <meta name="description" content="Official announcement portal by Alamin. Post, engage, and stay informed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════════════════════ -->
<div id="auth-screen" class="screen active">
  <div class="auth-wrap">
    <div class="auth-brand">
      <img src="1774627514585.png" alt="Logo" style="width: 56px; height: 56px; border-radius: 16px; object-fit: cover; margin: 0 auto 14px; display: block;">
      <h1>Alamin Notices</h1>
      <p>Official Announcement Portal</p>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter')handleLogin()" />
      </div>
      <button class="btn-gold" id="btn-login" onclick="handleLogin()">Sign In →</button>
    </div>

    <!-- Signup -->
    <div id="signup-form" style="display:none">
      <div class="field">
        <label>Your Display Name</label>
        <input type="text" id="signup-name" placeholder="e.g. Alamin" />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="signup-email" placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>Password <span style="color:var(--text-soft);font-size:10px;">(min 6 chars)</span></label>
        <input type="password" id="signup-password" placeholder="Create a password"
               onkeydown="if(event.key==='Enter')handleSignup()" />
      </div>
      <button class="btn-gold" id="btn-signup" onclick="handleSignup()">Create Account →</button>
    </div>

    <div class="msg-box" id="auth-msg"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     APP SCREEN
══════════════════════════════════════════════════════════ -->
<div id="app-screen" class="screen">

  <!-- Header -->
  <header id="site-header">
    <div class="h-brand">
      <img src="1774627514585.png" alt="Alamin Logo" style="width: 34px; height: 34px; border-radius: 9px; object-fit: cover;">
      <h2>Alamin Notices</h2>
    </div>

    <div class="h-search">
      <span class="s-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search notices…" oninput="handleSearch(event)" />
    </div>

    <div class="h-right">
      <button class="btn-ghost" id="btn-dashboard" style="display:none" onclick="openDashboard()">📊 Dashboard</button>
      <button class="btn-ghost" onclick="openSettings()" title="Settings">⚙️</button>
      <div class="user-chip">
        <div class="av" id="user-av">?</div>
        <span class="chip-name" id="user-name"></span>
      </div>
      <button class="btn-ghost" onclick="handleLogout()">Sign out</button>
    </div>
  </header>

  <!-- Feed -->
  <main id="app-body">
    <div class="feed-heading">
      <h3>Latest Notices</h3>
      <span id="notice-count">Loading…</span>
    </div>

    <div id="search-banner" style="display:none">
      <span id="search-result-text"></span>
      <button onclick="clearSearch()" title="Clear search">×</button>
    </div>

    <div id="feed"></div>
  </main>
</div>

<!-- FAB -->
<button id="fab" title="Post a Notice" onclick="openPost()">＋</button>

<!-- Toast -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     POST / EDIT MODAL
══════════════════════════════════════════════════════════ -->
<div class="overlay" id="post-modal" onclick="handleOverlayClick(event,'post-modal')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title-text">New <em>Notice</em></div>

    <div class="field">
      <label>Content</label>
      <textarea id="post-content" rows="5" placeholder="Write your announcement…"></textarea>
    </div>

    <img id="img-preview" alt="Preview" />
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="post-image" accept="image/*" onchange="previewImage(event)" />
      <div class="uz-icon">📎</div>
      <p><strong>Attach image</strong> — optional (auto-compressed)</p>
    </div>

    <div class="field">
      <label>Schedule (optional — leave blank to publish now)</label>
      <input type="datetime-local" id="post-schedule" />
    </div>

    <div class="field">
      <label>Reaction Emojis</label>
      <div class="emoji-config" id="emoji-tags"></div>
      <div class="emoji-add-row">
        <input type="text" id="new-emoji" placeholder="➕" maxlength="2" />
        <button class="btn-sm" onclick="addEmoji()">Add Emoji</button>
      </div>
    </div>

    <div class="msg-box" id="post-error"></div>

    <div class="sheet-actions">
      <button class="btn-outline" onclick="closePost()">Cancel</button>
      <button class="btn-publish" id="btn-publish" onclick="handlePublish()">Publish Notice</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     SETTINGS MODAL
══════════════════════════════════════════════════════════ -->
<div class="overlay" id="settings-modal" onclick="handleOverlayClick(event,'settings-modal')">
  <div class="sheet" style="max-width:420px">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Your <em>Settings</em></div>

    <div class="field">
      <label>Display Name <span style="color:var(--text-soft);font-size:10px;">(shown instead of email)</span></label>
      <input type="text" id="settings-name" placeholder="Your name" />
    </div>

    <div class="msg-box" id="settings-msg"></div>

    <div class="sheet-actions">
      <button class="btn-outline" onclick="closeSettings()">Cancel</button>
      <button class="btn-publish" id="btn-save-settings" onclick="saveSettings()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     ADMIN DASHBOARD MODAL
══════════════════════════════════════════════════════════ -->
<div class="overlay" id="dash-modal" onclick="handleOverlayClick(event,'dash-modal')">
  <div class="sheet" style="max-width:660px">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Admin <em>Dashboard</em></div>
    <div id="dash-content"></div>
    <div class="sheet-actions" style="margin-top:24px">
      <button class="btn-outline" onclick="closeDashboard()">Close</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
