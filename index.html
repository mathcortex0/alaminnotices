<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamin Notices | Premium Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-overlay" class="overlay">
        <div class="auth-card">
            <img src="1774627514585.png" alt="Logo" class="logo-large">
            <h1>Alamin Notices</h1>
            
            <div class="auth-tabs">
                <button id="tab-login" class="active">Login</button>
                <button id="tab-signup">Sign Up</button>
            </div>

            <div class="auth-form">
                <input type="email" id="auth-email" placeholder="Email Address">
                <input type="password" id="auth-password" placeholder="Password">
                <button id="auth-action-btn" class="btn-primary">Login</button>
                <p id="auth-msg"></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="navbar">
            <div class="nav-content">
                <img src="1774627514585.png" alt="Logo" class="logo-small">
                <span class="brand-name">ALAMIN NOTICES</span>
            </div>
            <button id="logout-btn" class="btn-outline">Logout</button>
        </nav>

        <main class="feed-container">
            <div id="notices-list">
                </div>
        </main>

        <button id="admin-fab" class="fab hidden">+</button>
    </div>

    <div id="admin-modal" class="modal hidden">
        <div class="modal-content">
            <h2>New Announcement</h2>
            <input type="text" id="post-title" placeholder="Title">
            <textarea id="post-content" rows="5" placeholder="What's the update?"></textarea>
            <div class="file-area">
                <label>Add Image (Optional)</label>
                <input type="file" id="post-image" accept="image/*">
            </div>
            <div class="modal-actions">
                <button id="close-modal" class="btn-outline">Cancel</button>
                <button id="submit-post" class="btn-primary">Post Notice</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
