<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Alamin Notices</title>
  <meta name="description" content="Official announcement portal by Alamin."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ════════════════════════════════════════════════════
     AUTH SCREEN
════════════════════════════════════════════════════ -->
<div id="auth-screen" class="screen active">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="logo.png" alt="Alamin Notices" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div style="display:none;width:62px;height:62px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--gold-lt));align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--navy);margin:0 auto 13px;box-shadow:var(--shadow-gold)">A</div>
      <h1>Alamin Notices</h1>
      <p>Official Announcement Portal</p>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="field"><label>Email Address</label>
        <input type="email" id="login-email" placeholder="your@email.com"/>
      </div>
      <div class="field"><label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()"/>
      </div>
      <button class="btn-gold" id="btn-login" onclick="handleLogin()">Sign In →</button>
    </div>

    <!-- Signup -->
    <div id="signup-form" style="display:none">
      <div class="field"><label>Display Name</label>
        <input type="text" id="signup-name" placeholder="e.g. Alamin"/>
      </div>
      <div class="field"><label>Email Address</label>
        <input type="email" id="signup-email" placeholder="your@email.com"/>
      </div>
      <div class="field"><label>Password <span style="color:var(--text-soft);font-size:10px">(min 6 chars)</span></label>
        <input type="password" id="signup-password" placeholder="Create a password" onkeydown="if(event.key==='Enter')handleSignup()"/>
      </div>
      <button class="btn-gold" id="btn-signup" onclick="handleSignup()">Create Account →</button>
    </div>

    <div class="divider">or</div>
    <button class="btn-google" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="msg-box" id="auth-msg"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     APP SCREEN (main feed)
════════════════════════════════════════════════════ -->
<div id="app-screen" class="screen">
  <header id="site-header">
    <div class="h-logo">
      <img src="logo.png" alt="logo" onerror="this.style.display='none'"/>
      <span class="h-logo-text">Alamin Notices</span>
    </div>

    <div class="h-search">
      <span class="h-search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="search-input" placeholder="Search notices…" oninput="handleSearch(event)"/>
    </div>

    <div class="h-right">
      <!-- Dashboard: admin only -->
      <button class="h-icon-btn" id="btn-dashboard" style="display:none" onclick="openDashboard()" title="Dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <!-- Settings -->
      <button class="h-icon-btn" onclick="openSettings()" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <!-- User chip -->
      <div class="user-chip">
        <div class="user-av" id="user-av-txt">?</div>
        <span class="user-name-txt" id="user-name-txt"></span>
      </div>
      <!-- Sign out -->
      <button class="h-icon-btn sign-out" onclick="handleLogout()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main id="app-body">
    <div class="feed-top">
      <h2>Latest Notices</h2>
      <span id="notice-count">Loading…</span>
    </div>
    <div id="search-banner">
      <span id="search-result-text"></span>
      <button onclick="clearSearch()">×</button>
    </div>
    <div id="feed"></div>
  </main>
</div>

<!-- ════════════════════════════════════════════════════
     SINGLE NOTICE SCREEN (deep link)
════════════════════════════════════════════════════ -->
<div id="single-screen" class="screen">
  <header id="site-header" style="position:sticky;top:0;z-index:200;height:60px;background:rgba(8,15,28,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--navy-line);display:flex;align-items:center;padding:0 20px;gap:12px">
    <div class="h-logo">
      <img src="logo.png" alt="logo" onerror="this.style.display='none'"/>
      <span class="h-logo-text">Alamin Notices</span>
    </div>
    <div class="h-right" style="margin-left:auto">
      <button class="h-icon-btn" id="btn-dashboard2" style="display:none" onclick="openDashboard()" title="Dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="h-icon-btn" onclick="openSettings()" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="user-chip">
        <div class="user-av" id="user-av-txt2">?</div>
        <span class="user-name-txt" id="user-name-txt2"></span>
      </div>
      <button class="h-icon-btn sign-out" onclick="handleLogout()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>
  <main id="single-body"></main>
</div>

<!-- FAB (admin) -->
<button id="fab" title="New Notice" onclick="openPost()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Toast -->
<div id="toast"></div>

<!-- ════════════════════════════════════════════════════
     POST / EDIT MODAL
════════════════════════════════════════════════════ -->
<div class="overlay" id="post-modal" onclick="overlayClick(event,'post-modal')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="modal-title">New <em>Notice</em></div>
    <div class="field"><label>Content</label>
      <textarea id="post-content" rows="5" placeholder="Write your announcement…"></textarea>
    </div>
    <img id="img-preview" alt="Preview"/>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="post-image" accept="image/*" onchange="previewImage(event)"/>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 8px;opacity:.4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p><strong>Attach image</strong> — optional, auto-compressed</p>
    </div>
    <div class="field"><label>Schedule (leave blank to publish now)</label>
      <input type="datetime-local" id="post-schedule"/>
    </div>
    <div class="msg-box" id="post-error"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closePost()">Cancel</button>
      <button class="btn-publish" id="btn-publish" onclick="handlePublish()">Publish Notice</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     SETTINGS MODAL
════════════════════════════════════════════════════ -->
<div class="overlay" id="settings-modal" onclick="overlayClick(event,'settings-modal')">
  <div class="sheet" style="max-width:420px">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Your <em>Settings</em></div>
    <div class="field"><label>Display Name <span style="color:var(--text-soft);font-size:10px">(shown publicly, not your email)</span></label>
      <input type="text" id="settings-name" placeholder="Your name"/>
    </div>
    <div class="msg-box" id="settings-msg"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-publish" id="btn-save-settings" onclick="saveSettings()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     ADMIN DASHBOARD MODAL
════════════════════════════════════════════════════ -->
<div class="overlay" id="dash-modal" onclick="overlayClick(event,'dash-modal')">
  <div class="sheet" style="max-width:660px">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Admin <em>Dashboard</em></div>
    <div id="dash-content"></div>
    <div class="sheet-actions" style="margin-top:20px">
      <button class="btn-cancel" onclick="closeDashboard()">Close</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
