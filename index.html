<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Alamin Notices | Official Announcement Portal</title>
  <meta name="description" content="Official announcement portal by Alamin. Stay informed with the latest notices." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-page: #f8fafc;
      --bg-surface: #ffffff;
      --bg-elevated: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --accent: #e11d48;
      --accent-light: #ffe4e6;
      --accent-hover: #be123c;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg-page: #0a0c0f;
      --bg-surface: #11161b;
      --bg-elevated: #1a2127;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border: #1e293b;
      --accent-light: #2c1a24;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      transition: var(--transition);
      min-height: 100vh;
    }

    /* Auth Screen */
    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      background: var(--bg-page);
    }
    .auth-card {
      max-width: 420px;
      width: 100%;
      background: var(--bg-surface);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo img {
      width: 70px;
      height: 70px;
      border-radius: 1rem;
      margin-bottom: 1rem;
      object-fit: cover;
    }
    .auth-logo h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #f43f5e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .auth-logo p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }
    .tab-bar {
      display: flex;
      gap: 0.5rem;
      background: var(--bg-elevated);
      padding: 0.25rem;
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.625rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 500;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn.active {
      background: var(--bg-surface);
      color: var(--accent);
      box-shadow: var(--shadow-sm);
    }
    .field {
      margin-bottom: 1.25rem;
    }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      transition: var(--transition);
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .btn-primary {
      width: 100%;
      padding: 0.875rem;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    .btn-secondary {
      padding: 0.75rem 1.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-secondary);
    }
    .msg-box {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      display: none;
    }
    .msg-box.error { background: #fee2e2; color: #dc2626; display: block; }
    .msg-box.success { background: #dcfce7; color: #16a34a; display: block; }

    /* App Header */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      backdrop-filter: blur(10px);
      background: rgba(var(--bg-surface-rgb, 255,255,255), 0.95);
    }
    .header-content {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo-area img {
      width: 36px;
      height: 36px;
      border-radius: 0.5rem;
      object-fit: cover;
    }
    .logo-area h2 {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .search-area {
      flex: 1;
      position: relative;
      min-width: 180px;
    }
    .search-area svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
    }
    .search-area input {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      color: var(--text-primary);
      font-size: 0.875rem;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.25rem 0.75rem 0.25rem 0.25rem;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      font-size: 0.875rem;
    }
    .user-name {
      font-size: 0.875rem;
      font-weight: 500;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Category Filters */
    .category-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-chip {
      padding: 0.5rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      font-size: 0.875rem;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-secondary);
    }
    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Notice Card */
    .notice-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: var(--transition);
    }
    .notice-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .author-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .author-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
    }
    .author-name {
      font-weight: 600;
      font-size: 0.875rem;
    }
    .notice-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .category-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 500;
      background: var(--bg-elevated);
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }
    .category-badge.urgent { background: #fee2e2; color: #dc2626; }
    .category-badge.event { background: #dcfce7; color: #16a34a; }
    .category-badge.announcement { background: #fff3e3; color: #f97316; }
    [data-theme="dark"] .category-badge.urgent { background: #2c1a1a; color: #f87171; }
    [data-theme="dark"] .category-badge.event { background: #1a2c1a; color: #4ade80; }
    [data-theme="dark"] .category-badge.announcement { background: #2c241a; color: #fb923c; }
    .notice-title {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .notice-content {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      white-space: pre-wrap;
    }
    .notice-image {
      max-width: 100%;
      border-radius: var(--radius-md);
      margin: 0.75rem 0;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .like-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.375rem 0.75rem;
      border-radius: 2rem;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .like-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }
    .like-btn.liked {
      color: var(--accent);
    }
    .like-btn.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
    }
    .like-count {
      font-size: 0.875rem;
      font-weight: 500;
    }
    .comment-btn, .share-btn {
      background: transparent;
      border: none;
      padding: 0.375rem 0.75rem;
      border-radius: 2rem;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .admin-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .admin-btn {
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      cursor: pointer;
    }

    /* Comments Section */
    .comments-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: none;
    }
    .comments-section.open {
      display: block;
    }
    .comment {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .comment.reply {
      margin-left: 2.5rem;
    }
    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: white;
      flex-shrink: 0;
    }
    .comment-bubble {
      flex: 1;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 0.5rem 0.75rem;
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
    }
    .comment-name {
      font-weight: 600;
      font-size: 0.75rem;
    }
    .comment-time {
      font-size: 0.65rem;
      color: var(--text-muted);
    }
    .comment-text {
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }
    .comment-actions {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.75rem;
    }
    .reply-btn {
      background: none;
      border: none;
      font-size: 0.7rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .reply-form {
      margin-top: 0.5rem;
      display: flex;
      gap: 0.5rem;
    }
    .reply-form input {
      flex: 1;
      padding: 0.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      font-size: 0.75rem;
    }
    .comment-input {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .comment-input input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
    }

    /* Skeleton */
    .skeleton-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .skeleton-line {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg-elevated) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 0.25rem;
      height: 12px;
      margin-bottom: 0.75rem;
    }
    .skeleton-title { height: 20px; width: 60%; }
    .skeleton-text { height: 40px; width: 100%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-content {
      background: var(--bg-surface);
      border-radius: var(--radius-xl);
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .close-modal {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }
    .modal-footer {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: var(--shadow-lg);
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.75rem 1.5rem;
      box-shadow: var(--shadow-lg);
      z-index: 1100;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <img id="authLogo" src="1774627514585.png" alt="Alamin Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e11d48%22/%3E%3Ctext x=%2250%22 y=%2268%22 font-size=%2248%22 text-anchor=%22middle%22 fill=%22white%22%3EA%3C/text%3E%3C/svg%3E'">
      <h1>Alamin Notices</h1>
      <p>Official Announcement Portal</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tabLoginBtn" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tabSignupBtn" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="handleLogin()">Sign In →</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="field"><label>Display Name</label><input type="text" id="signupName" placeholder="Your name"></div>
      <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com"></div>
      <div class="field"><label>Password (min 6)</label><input type="password" id="signupPassword" placeholder="Create password"></div>
      <button class="btn-primary" onclick="handleSignup()">Create Account →</button>
    </div>
    <div id="authMsg" class="msg-box"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" style="display:none">
  <header class="app-header">
    <div class="header-content">
      <div class="logo-area"><img src="1774627514585.png" alt="Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23e11d48%22/%3E%3Ctext x=%2250%22 y=%2268%22 font-size=%2248%22 text-anchor=%22middle%22 fill=%22white%22%3EA%3C/text%3E%3C/svg%3E'"><h2>Alamin</h2></div>
      <div class="search-area"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="10" r="7"/><path d="M21 21l-6-6"/></svg><input type="text" id="searchInput" placeholder="Search notices..."></div>
      <div class="header-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh">⟳</button>
        <button class="icon-btn" id="themeToggleBtn" title="Theme">🌙</button>
        <div class="user-chip"><div class="user-avatar" id="userAvatar">U</div><span class="user-name" id="userNameDisplay"></span></div>
        <button class="icon-btn" onclick="handleLogout()" title="Sign out">🚪</button>
      </div>
    </div>
  </header>
  <div class="container">
    <div class="category-filters" id="categoryFilters">
      <button class="filter-chip active" data-category="all">All</button>
      <button class="filter-chip" data-category="announcement">📢 Announcement</button>
      <button class="filter-chip" data-category="urgent">⚠️ Urgent</button>
      <button class="filter-chip" data-category="event">🎉 Event</button>
      <button class="filter-chip" data-category="general">ℹ️ General</button>
    </div>
    <div id="feedContainer"></div>
  </div>
  <button class="fab" id="fabBtn" onclick="openPostModal()">+</button>
</div>

<!-- POST MODAL -->
<div id="postModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header"><h3 id="postModalTitle">New Notice</h3><button class="close-modal" onclick="closePostModal()">×</button></div>
    <div class="field"><label>Category</label><select id="postCategory"><option value="general">General</option><option value="announcement">Announcement</option><option value="urgent">Urgent</option><option value="event">Event</option></select></div>
    <div class="field"><label>Title</label><input type="text" id="postTitle" placeholder="Notice title"></div>
    <div class="field"><label>Content</label><textarea id="postContent" rows="5" placeholder="Write your notice... Use **bold**, *italic*, [link](url), - for lists"></textarea></div>
    <div class="field"><label>Image (optional)</label><input type="file" id="postImage" accept="image/*"></div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closePostModal()">Cancel</button><button class="btn-primary" id="publishBtn" onclick="publishNotice()">Publish</button></div>
    <div id="postMsg" class="msg-box"></div>
  </div>
</div>

<script>
// ============================================================
// ALAMIN NOTICES — COMPLETE APP WITH PERSISTENT LOGIN
// ============================================================

const SUPABASE_URL = 'https://stczzndroorzorquszxn.supabase.co';
const SUPABASE_ANON = 'sb_publishable_7_58bmgqais4Y_EJtlO2Nw_bLgs2uUq';
const ADMIN_EMAIL = 'text.me.md.alamin@gmail.com';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    storageKey: 'alamin-persistent-auth',
    storage: localStorage
  }
});

let currentUser = null, isAdmin = false, displayName = '', currentCategory = 'all', allNotices = [], editId = null;
let userLikes = JSON.parse(localStorage.getItem('alamin_user_likes') || '{}');

// ============================================================
// PERSISTENT LOGIN — NEVER LOGS OUT ON REFRESH
// ============================================================
(async function initPersistentLogin() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    isAdmin = currentUser.email === ADMIN_EMAIL;
    await loadProfile();
    showApp();
  }
})();

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    currentUser = session.user;
    isAdmin = currentUser.email === ADMIN_EMAIL;
    await loadProfile();
    showApp();
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    userLikes = {};
    localStorage.removeItem('alamin_user_likes');
    showAuth();
  }
});

async function loadProfile() {
  const { data } = await sb.from('profiles').select('display_name').eq('id', currentUser.id).single();
  displayName = data?.display_name || currentUser.email.split('@')[0];
  document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
  document.getElementById('userNameDisplay').textContent = displayName;
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  loadFeed();
}
function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

// ============================================================
// AUTH FUNCTIONS
// ============================================================
window.switchTab = (tab) => {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tabLoginBtn').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignupBtn').classList.toggle('active', tab === 'signup');
};

window.handleLogin = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showAuthMsg('Please fill all fields', 'error');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) showAuthMsg(error.message, 'error');
};

window.handleSignup = async () => {
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const name = document.getElementById('signupName').value;
  if (!email || !password || !name) return showAuthMsg('All fields required', 'error');
  if (password.length < 6) return showAuthMsg('Password min 6 chars', 'error');
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) return showAuthMsg(error.message, 'error');
  if (data.user) await sb.from('profiles').upsert({ id: data.user.id, display_name: name });
  showAuthMsg('Account created! Please sign in.', 'success');
};

window.handleLogout = async () => {
  await sb.auth.signOut();
  userLikes = {};
  localStorage.removeItem('alamin_user_likes');
};

function showAuthMsg(msg, type) {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = `msg-box ${type}`;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ============================================================
// FEED & NOTICES
// ============================================================
async function loadFeed() {
  const container = document.getElementById('feedContainer');
  container.innerHTML = '<div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line skeleton-text"></div></div>'.repeat(2);
  
  let query = sb.from('notices').select('*').order('is_pinned', { ascending: false }).order('created_at', { ascending: false });
  if (currentCategory !== 'all') query = query.eq('category', currentCategory);
  
  const { data, error } = await query;
  if (error) { container.innerHTML = '<p>Error loading notices</p>'; return; }
  allNotices = data || [];
  renderNotices();
}

async function renderNotices() {
  const container = document.getElementById('feedContainer');
  if (!allNotices.length) {
    container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted)">No notices yet</div>';
    return;
  }
  
  const authorIds = [...new Set(allNotices.map(n => n.author_id))];
  let profileMap = {};
  if (authorIds.length) {
    const { data } = await sb.from('profiles').select('id,display_name').in('id', authorIds);
    data?.forEach(p => profileMap[p.id] = p.display_name);
  }
  
  container.innerHTML = '';
  for (const notice of allNotices) {
    const author = profileMap[notice.author_id] || 'Admin';
    const userLiked = userLikes[notice.id] === true;
    const card = document.createElement('div');
    card.className = 'notice-card';
    card.innerHTML = `
      <div class="card-header">
        <div class="author-info"><div class="author-avatar">${author.charAt(0)}</div><span class="author-name">${escapeHtml(author)}</span></div>
        <span class="notice-time">${formatTime(notice.created_at)}</span>
      </div>
      <div class="category-badge ${notice.category || 'general'}">${notice.category || 'general'}</div>
      <div class="notice-title">${escapeHtml(notice.title || 'Notice')}</div>
      <div class="notice-content">${renderMarkdown(notice.content || '')}</div>
      ${notice.image_url ? `<img src="${notice.image_url}" class="notice-image" loading="lazy">` : ''}
      <div class="card-footer">
        <button class="like-btn ${userLiked ? 'liked' : ''}" data-id="${notice.id}">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          <span class="like-count">${notice.likes_count || 0}</span>
        </button>
        <button class="comment-btn" onclick="toggleComments('${notice.id}', this)">💬 Comments</button>
        <button class="share-btn" onclick="shareNotice('${notice.id}')">↗ Share</button>
      </div>
      <div id="comments-${notice.id}" class="comments-section"></div>
      ${isAdmin ? `<div class="admin-actions"><button class="admin-btn" onclick="editNotice('${notice.id}')">Edit</button><button class="admin-btn" onclick="deleteNotice('${notice.id}')">Delete</button><button class="admin-btn" onclick="togglePin('${notice.id}')">${notice.is_pinned ? 'Unpin' : 'Pin'}</button></div>` : ''}
    `;
    const likeBtn = card.querySelector('.like-btn');
    likeBtn?.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(notice.id); });
    container.appendChild(card);
  }
}

async function toggleLike(noticeId) {
  if (!currentUser) return;
  const notice = allNotices.find(n => n.id === noticeId);
  if (!notice) return;
  let newCount = notice.likes_count || 0;
  const wasLiked = userLikes[noticeId] === true;
  if (wasLiked) { newCount--; delete userLikes[noticeId]; }
  else { newCount++; userLikes[noticeId] = true; }
  localStorage.setItem('alamin_user_likes', JSON.stringify(userLikes));
  await sb.from('notices').update({ likes_count: newCount }).eq('id', noticeId);
  notice.likes_count = newCount;
  renderNotices();
}

async function togglePin(id) {
  const notice = allNotices.find(n => n.id === id);
  if (notice) await sb.from('notices').update({ is_pinned: !notice.is_pinned }).eq('id', id);
  loadFeed();
}

async function deleteNotice(id) {
  if (confirm('Delete this notice?')) {
    await sb.from('notices').delete().eq('id', id);
    loadFeed();
    showToast('Notice deleted');
  }
}

// ============================================================
// COMMENTS WITH REPLIES (100% WORKING)
// ============================================================
window.toggleComments = async (noticeId, btn) => {
  const section = document.getElementById(`comments-${noticeId}`);
  if (section.classList.contains('open')) {
    section.classList.remove('open');
    return;
  }
  section.classList.add('open');
  section.innerHTML = '<div style="padding:0.5rem;text-align:center">Loading comments...</div>';
  await loadComments(noticeId, section);
};

async function loadComments(noticeId, container) {
  const { data: comments } = await sb.from('comments').select('*').eq('notice_id', noticeId).order('created_at', { ascending: true });
  const profileIds = [...new Set((comments || []).map(c => c.author_id))];
  let profileMap = {};
  if (profileIds.length) {
    const { data } = await sb.from('profiles').select('id,display_name').in('id', profileIds);
    data?.forEach(p => profileMap[p.id] = p.display_name);
  }
  
  container.innerHTML = '';
  const topComments = (comments || []).filter(c => !c.parent_id);
  const replies = (comments || []).filter(c => c.parent_id);
  
  for (const comment of topComments) {
    const commentDiv = buildCommentElement(comment, profileMap[comment.author_id] || 'User', noticeId);
    container.appendChild(commentDiv);
    const childReplies = replies.filter(r => r.parent_id === comment.id);
    for (const reply of childReplies) {
      const replyDiv = buildCommentElement(reply, profileMap[reply.author_id] || 'User', noticeId, true);
      container.appendChild(replyDiv);
    }
  }
  
  const inputDiv = document.createElement('div');
  inputDiv.className = 'comment-input';
  inputDiv.innerHTML = `<input type="text" id="newCommentInput-${noticeId}" placeholder="Write a comment..."><button class="btn-secondary" style="padding:0.5rem 1rem" onclick="addComment('${noticeId}')">Send</button>`;
  container.appendChild(inputDiv);
}

function buildCommentElement(comment, authorName, noticeId, isReply = false) {
  const div = document.createElement('div');
  div.className = `comment ${isReply ? 'reply' : ''}`;
  div.id = `comment-${comment.id}`;
  div.innerHTML = `
    <div class="comment-avatar">${authorName.charAt(0)}</div>
    <div class="comment-bubble">
      <div class="comment-header"><span class="comment-name">${escapeHtml(authorName)}</span><span class="comment-time">${formatTime(comment.created_at)}</span></div>
      <div class="comment-text">${escapeHtml(comment.content)}</div>
      <div class="comment-actions"><button class="reply-btn" onclick="showReplyForm('${comment.id}', '${noticeId}')">↩ Reply</button></div>
      <div id="replyForm-${comment.id}"></div>
    </div>
  `;
  return div;
}

window.showReplyForm = (parentId, noticeId) => {
  const container = document.getElementById(`replyForm-${parentId}`);
  if (container.innerHTML) { container.innerHTML = ''; return; }
  container.innerHTML = `<div class="reply-form"><input type="text" id="replyInput-${parentId}" placeholder="Write a reply..."><button class="btn-secondary" style="padding:0.25rem 0.75rem" onclick="addReply('${parentId}', '${noticeId}')">Reply</button></div>`;
};

window.addComment = async (noticeId) => {
  const input = document.getElementById(`newCommentInput-${noticeId}`);
  const content = input?.value.trim();
  if (!content) return;
  input.value = '';
  await sb.from('comments').insert({ notice_id: noticeId, content, author_id: currentUser.id });
  const section = document.getElementById(`comments-${noticeId}`);
  await loadComments(noticeId, section);
  showToast('Comment added');
};

window.addReply = async (parentId, noticeId) => {
  const input = document.getElementById(`replyInput-${parentId}`);
  const content = input?.value.trim();
  if (!content) return;
  input.value = '';
  await sb.from('comments').insert({ notice_id: noticeId, parent_id: parentId, content, author_id: currentUser.id });
  const section = document.getElementById(`comments-${noticeId}`);
  await loadComments(noticeId, section);
  showToast('Reply added');
};

// ============================================================
// UTILITIES
// ============================================================
window.shareNotice = (id) => {
  navigator.clipboard.writeText(`${location.origin}${location.pathname}?id=${id}`);
  showToast('Link copied!');
};

function renderMarkdown(text) {
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>')
    .replace(/^- (.*)/gm, '<li>$1</li>')
    .replace(/^\d+\. (.*)/gm, '<li>$1</li>');
  return html;
}

window.openPostModal = () => {
  editId = null;
  document.getElementById('postModalTitle').textContent = 'New Notice';
  document.getElementById('postTitle').value = '';
  document.getElementById('postContent').value = '';
  document.getElementById('postCategory').value = 'general';
  document.getElementById('postImage').value = '';
  document.getElementById('postModal').classList.add('open');
};

window.closePostModal = () => document.getElementById('postModal').classList.remove('open');

window.publishNotice = async () => {
  const title = document.getElementById('postTitle').value;
  const content = document.getElementById('postContent').value;
  const category = document.getElementById('postCategory').value;
  if (!content && !title) return showToast('Please add content');
  const file = document.getElementById('postImage').files[0];
  let image_url = null;
  if (file) {
    const fname = Date.now() + '-' + file.name;
    const { error } = await sb.storage.from('notice-images').upload(fname, file);
    if (!error) image_url = sb.storage.from('notice-images').getPublicUrl(fname).data.publicUrl;
  }
  const { error } = await sb.from('notices').insert([{ title, content, category, image_url, author_id: currentUser.id, author_email: currentUser.email, likes_count: 0 }]);
  if (error) showToast(error.message);
  else { closePostModal(); loadFeed(); showToast('Notice published!'); }
};

window.editNotice = async (id) => {
  const notice = allNotices.find(n => n.id === id);
  if (notice) {
    editId = id;
    document.getElementById('postModalTitle').textContent = 'Edit Notice';
    document.getElementById('postTitle').value = notice.title || '';
    document.getElementById('postContent').value = notice.content || '';
    document.getElementById('postCategory').value = notice.category || 'general';
    document.getElementById('postModal').classList.add('open');
    window.publishNotice = async () => {
      await sb.from('notices').update({ title: document.getElementById('postTitle').value, content: document.getElementById('postContent').value, category: document.getElementById('postCategory').value }).eq('id', editId);
      closePostModal(); loadFeed(); showToast('Updated');
    };
  }
};

function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }) || ''; }
function formatTime(iso) { const d = new Date(iso), diff = Math.floor((Date.now() - d) / 1000); if(diff < 60) return 'just now'; if(diff < 3600) return Math.floor(diff/60)+'m ago'; if(diff < 86400) return Math.floor(diff/3600)+'h ago'; return d.toLocaleDateString(); }
function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

document.getElementById('refreshBtn')?.addEventListener('click', () => loadFeed());
document.getElementById('searchInput')?.addEventListener('input', (e) => { const q = e.target.value.trim(); if(q.length >= 2) loadSearch(q); else loadFeed(); });
async function loadSearch(q) { const { data } = await sb.from('notices').select('*').textSearch('content', q); allNotices = data || []; renderNotices(); }
document.querySelectorAll('.filter-chip').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentCategory = btn.dataset.category; loadFeed(); }); });
document.getElementById('themeToggleBtn')?.addEventListener('click', () => { const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark'); localStorage.setItem('theme', isDark ? 'light' : 'dark'); });
if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
window.showToast = showToast;
</script>
