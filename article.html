<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 700px; margin: auto; padding: 20px; line-height: 1.7; color: #222; }
        .back { text-decoration: none; color: #666; font-size: 0.9rem; }
        img { width: 100%; border-radius: 12px; margin: 20px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { font-size: 2.5rem; line-height: 1.2; margin-bottom: 10px; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .content { font-size: 1.1rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← All Articles</a>
    <div id="article">Loading content...</div>

    <script>
        const supabaseUrl = 'https://szzqaqwpvxwrefkojplh.supabase.co';
        const supabaseKey = 'sb_publishable_xthiJ5eahaJU5w7kGDaY_A_vIwODkTa';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const slug = new URLSearchParams(window.location.search).get('id');

        async function load() {
            const { data, error } = await _supabase.from('posts').select('*').eq('slug', slug).single();
            if (error || !data) return document.getElementById('article').innerHTML = "<h1>Post not found.</h1>";
            
            document.title = data.title;
            document.getElementById('article').innerHTML = `
                <img src="${data.image_url}" alt="">
                <h1>${data.title}</h1>
                <div class="meta">Published: ${new Date(data.created_at).toLocaleDateString()}</div>
                <div class="content">${data.content}</div>
            `;
        }
        load();
    </script>
</body>
</html>
