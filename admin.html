<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editorial Desk — The Alamin Gazette</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#0f0f0f; --ink-2:#3a3a3a; --ink-3:#6e6e6e;
      --paper:#f9f7f3; --paper-2:#f1ece3; --rule:#cfc8bb;
      --navy:#0b1927; --crimson:#b01428; --gold:#c8922a; --green:#0e3d27;
      --surface:#fff;
      --serif:'Playfair Display',Georgia,serif; --ui:'DM Sans',system-ui,sans-serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--ui); background:#ebe5db; color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }

    /* ── HEADER ─────────────────── */
    .hdr {
      background: var(--navy);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--gold);
      position: sticky; top:0; z-index:50;
    }
    .hdr-left { display:flex; align-items:center; gap:14px; }
    .hdr-logo { font-family:var(--serif); font-size:1.3rem; font-weight:900; color:#ede8e0; text-decoration:none; }
    .hdr-badge { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:rgba(200,146,42,.18); border:1px solid rgba(200,146,42,.35); color:var(--gold); padding:3px 10px; border-radius:2px; }
    .hdr-right { display:flex; align-items:center; gap:12px; }
    .hdr-link { color:#6a7a8a; font-size:12px; font-weight:600; text-decoration:none; transition:color .2s; }
    .hdr-link:hover { color:#ede8e0; }
    #logout-btn { display:none; background:transparent; border:1px solid rgba(255,255,255,.12); color:#6a7a8a; font-family:var(--ui); font-size:12px; font-weight:600; padding:6px 14px; cursor:pointer; border-radius:2px; transition:all .2s; }
    #logout-btn:hover { color:#ede8e0; border-color:rgba(255,255,255,.3); }

    /* ── AUTH ─────────────────── */
    #auth-screen {
      min-height: calc(100vh - 60px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .auth-box {
      background: var(--surface);
      width: 100%; max-width: 420px;
      padding: 48px 44px;
      box-shadow: 0 12px 48px rgba(0,0,0,.12);
    }
    .auth-box h2 { font-family:var(--serif); font-size:1.8rem; margin-bottom:8px; }
    .auth-box p { font-size:13px; color:var(--ink-3); margin-bottom:30px; }
    .auth-error { font-size:12.5px; color:var(--crimson); margin-bottom:14px; display:none; }

    /* ── MAIN LAYOUT ─────────────────── */
    #main-screen {
      display: none;
      grid-template-columns: 460px 1fr;
      min-height: calc(100vh - 60px);
    }

    /* ── FORM FIELDS ─────────────────── */
    .field { margin-bottom:16px; }
    .field label {
      display: block;
      font-size: 10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
      color: var(--ink-3); margin-bottom:7px;
    }
    .field input, .field textarea, .field select {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--rule);
      background: var(--paper);
      font-family: var(--ui); font-size:14px; color:var(--ink);
      border-radius:2px; outline:none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(11,25,39,.08);
    }
    .field textarea { resize:vertical; min-height:180px; line-height:1.65; }
    .field input[readonly] { background:#e8e2d8; color:var(--ink-3); cursor:not-allowed; }
    .slug-hint { font-size:10.5px; color:var(--ink-3); font-family:monospace; margin-top:5px; }

    /* ── BREAKING TOGGLE ─────────────────── */
    .breaking-row {
      display: flex; align-items:center; justify-content:space-between;
      padding: 14px 16px;
      border: 1.5px solid var(--rule);
      border-radius: 2px;
      background: var(--paper);
      margin-bottom: 16px;
      transition: border-color .3s, background .3s;
    }
    .breaking-row.on { border-color:var(--crimson); background:#fdf4f4; }
    .br-label { font-size:13.5px; font-weight:600; color:var(--ink-2); }
    .br-sub { font-size:11px; color:var(--ink-3); margin-top:2px; }
    .br-dot { width:8px; height:8px; border-radius:50%; background:var(--crimson); display:none; animation:blink-d 1s ease-in-out infinite; margin-right:8px; }
    .breaking-row.on .br-dot { display:inline-block; }
    @keyframes blink-d{0%,100%{opacity:1}50%{opacity:.2}}
    /* toggle switch */
    .sw { position:relative; width:46px; height:26px; flex-shrink:0; }
    .sw input { opacity:0; width:0; height:0; }
    .sw-track { position:absolute; inset:0; background:#cfc8bb; border-radius:26px; cursor:pointer; transition:.3s; }
    .sw-track::before { content:''; position:absolute; width:20px; height:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s; box-shadow:0 1px 4px rgba(0,0,0,.2); }
    .sw input:checked + .sw-track { background:var(--crimson); }
    .sw input:checked + .sw-track::before { transform:translateX(20px); }

    /* ── BUTTONS ─────────────────── */
    .btn {
      font-family:var(--ui); font-size:11.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
      padding:13px 24px; border:none; cursor:pointer; border-radius:2px;
      transition:all .2s; display:inline-flex; align-items:center; gap:8px;
    }
    .btn-navy  { background:var(--navy); color:#c0d0e0; }
    .btn-navy:hover { background:#0f2540; }
    .btn-green { background:var(--green); color:#90c8a8; }
    .btn-green:hover { background:#082816; }
    .btn-ghost { background:transparent; border:1.5px solid var(--rule); color:var(--ink-3); }
    .btn-ghost:hover { border-color:var(--ink); color:var(--ink); }
    .btn-danger { background:transparent; border:1.5px solid #ddb8bc; color:var(--crimson); }
    .btn-danger:hover { background:var(--crimson); color:#fff; border-color:var(--crimson); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-sm { padding:6px 13px; font-size:10px; }
    .btn-full { width:100%; justify-content:center; }

    /* ── EDITOR PANEL ─────────────────── */
    .editor-panel {
      background: var(--surface);
      padding: 30px 34px;
      overflow-y: auto;
      max-height: calc(100vh - 60px);
      border-right: 1px solid var(--rule);
    }
    .ep-header {
      display: flex; align-items:baseline; justify-content:space-between;
      padding-bottom: 18px; margin-bottom:24px;
      border-bottom: 2px solid var(--ink);
    }
    .ep-header h2 { font-family:var(--serif); font-size:1.4rem; font-weight:700; }

    /* upload status */
    .up-status { font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:5px; margin-top:6px; }
    .up-status.uploading { color:#1a60b0; }
    .up-status.ok { color:var(--green); }
    .up-status.fail { color:var(--crimson); }

    /* ── LIST PANEL ─────────────────── */
    .list-panel {
      background: var(--paper);
      padding: 30px 34px;
      overflow-y: auto;
      max-height: calc(100vh - 60px);
    }
    .lp-header {
      display: flex; align-items:center; justify-content:space-between;
      padding-bottom: 16px; margin-bottom:20px;
      border-bottom: 1px solid var(--rule);
    }
    .lp-header h3 { font-family:var(--serif); font-size:1.2rem; font-weight:700; }
    .count-badge { font-size:10.5px; font-weight:600; color:var(--ink-3); background:var(--paper-2); padding:3px 10px; border-radius:20px; }

    /* post row */
    .post-row {
      display: grid; grid-template-columns:56px 1fr auto;
      gap:13px; align-items:start;
      padding:14px 0; border-bottom:1px solid var(--rule);
      transition:background .15s;
    }
    .post-row:hover { background:var(--paper-2); margin:0 -8px; padding:14px 8px; }
    .post-thumb { width:56px; height:42px; object-fit:cover; border-radius:2px; background:var(--rule); flex-shrink:0; }
    .post-info h4 { font-size:13px; font-weight:600; line-height:1.3; margin-bottom:4px; }
    .post-info .pmeta { font-size:10.5px; color:var(--ink-3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .post-actions { display:flex; gap:6px; align-items:center; padding-top:2px; }

    .cat-mini { font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; padding:2px 6px; border-radius:2px; display:inline-block; }
    .chip-world{background:#0b1927;color:#9ab0c8;} .chip-economy{background:#0e3d27;color:#8ec8a8;}
    .chip-innovation{background:#0a3d78;color:#90b8e8;} .chip-defense{background:#3d0e1a;color:#c89098;}
    .chip-society{background:#3d3000;color:#c8b870;} .chip-default{background:#1a1a1a;color:#aaa;}

    .breaking-indicator { width:7px; height:7px; border-radius:50%; background:var(--crimson); display:inline-block; animation:blink-d 1.2s infinite; }

    /* ── TOAST ─────────────────── */
    .toast {
      position:fixed; bottom:28px; right:28px;
      background:var(--navy); color:#c0d0e0;
      font-size:13px; padding:14px 20px;
      border-radius:2px; box-shadow:0 6px 24px rgba(0,0,0,.25);
      z-index:999; opacity:0; transform:translateY(16px);
      transition:all .3s; pointer-events:none;
      border-left:3px solid var(--gold); max-width:280px;
    }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.ok  { border-left-color:#4caf80; }
    .toast.err { border-left-color:var(--crimson); }

    @media(max-width:960px) {
      #main-screen { grid-template-columns:1fr; }
      .editor-panel { max-height:none; border-right:none; border-bottom:1px solid var(--rule); }
      .list-panel { max-height:none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <a href="index.html" class="hdr-logo">The Alamin Gazette</a>
    <span class="hdr-badge">Editorial Desk</span>
  </div>
  <div class="hdr-right">
    <a href="index.html" class="hdr-link">← View Site</a>
    <button id="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
</header>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>Editorial Access</h2>
    <p>Sign in to manage The Alamin Gazette.</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw" placeholder="WordPress password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="auth-error" id="auth-err"></div>
    <button class="btn btn-navy btn-full" id="login-btn" onclick="doLogin()">Access Dashboard</button>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">

  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="ep-header">
      <h2 id="ep-title">New Article</h2>
      <button class="btn btn-ghost btn-sm" onclick="resetForm()">New Draft</button>
    </div>
    <input type="hidden" id="pid">

    <!-- BREAKING -->
    <div class="breaking-row" id="breaking-row">
      <div>
        <div style="display:flex;align-items:center;">
          <span class="br-dot"></span>
          <span class="br-label">Breaking News</span>
        </div>
        <div class="br-sub">Article floats to top of feed and ticker</div>
      </div>
      <label class="sw">
        <input type="checkbox" id="f-breaking" onchange="onBreaking()">
        <span class="sw-track"></span>
      </label>
    </div>

    <div class="field">
      <label>Cover Image</label>
      <input type="file" id="f-imgfile" accept="image/*" onchange="uploadImg()">
      <div id="up-status"></div>
      <input type="text" id="f-imgurl" placeholder="Image URL (auto-fills after upload)" readonly style="margin-top:8px;">
    </div>

    <div class="field">
      <label>Category</label>
      <select id="f-cat">
        <option value="">— Select Category —</option>
        <option value="World Affairs">World Affairs</option>
        <option value="Economy & Markets">Economy & Markets</option>
        <option value="Innovation">Innovation</option>
        <option value="Defense & Security">Defense & Security</option>
        <option value="Society">Society</option>
      </select>
    </div>

    <div class="field">
      <label>Author</label>
      <input type="text" id="f-author" placeholder="Alamin Gazette Staff">
    </div>

    <div class="field">
      <label>Headline</label>
      <input type="text" id="f-title" placeholder="Write a compelling headline…" oninput="autoSlug()">
    </div>

    <div class="field">
      <label>URL Slug</label>
      <input type="text" id="f-slug" placeholder="url-friendly-slug" oninput="updateSlugHint()">
      <div class="slug-hint" id="slug-hint">article.html?id=</div>
    </div>

    <div class="field">
      <label>Excerpt &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:var(--ink-3);">shown on cards & social previews</span></label>
      <textarea id="f-excerpt" rows="3" style="min-height:72px;" placeholder="1–2 sentence teaser that appears on the homepage…"></textarea>
    </div>

    <div class="field">
      <label>Full Article</label>
      <textarea id="f-content" rows="12" placeholder="Write the full article here. Separate paragraphs with a blank line."></textarea>
    </div>

    <button class="btn btn-green btn-full" id="save-btn" onclick="savePost()" style="margin-top:4px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="save-label">Publish Article</span>
    </button>
    <button class="btn btn-ghost btn-full" onclick="resetForm()" style="margin-top:10px;">Cancel / Clear</button>
  </div>

  <!-- LIST -->
  <div class="list-panel">
    <div class="lp-header">
      <h3>All Articles</h3>
      <span class="count-badge" id="post-count">—</span>
    </div>
    <div class="field" style="margin-bottom:20px;">
      <input type="text" id="search" placeholder="Search by title, author or category…" oninput="filterList()" style="background:#fff;">
    </div>
    <div id="post-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://szzqaqwpvxwrefkojplh.supabase.co';
const SUPA_KEY = 'sb_publishable_xthiJ5eahaJU5w7kGDaY_A_vIwODkTa';
const IBB_KEY  = '5eedf24deee3528bc34e811052972c74';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let allPosts = [];

// ── TOAST ───────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3400);
}

// ── AUTH ────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('pw').value.trim();
  const err = document.getElementById('auth-err');
  const btn = document.getElementById('login-btn');
  if (!pw) { err.textContent = 'Password required.'; err.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display='none';
  const { error } = await sb.auth.signInWithPassword({ email:'text.me.md.alamin@gmail.com', password:pw });
  if (error) {
    err.textContent = 'Incorrect password.'; err.style.display='block';
    btn.disabled=false; btn.textContent='Access Dashboard'; return;
  }
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').style.display  = 'grid';
  document.getElementById('logout-btn').style.display   = 'block';
  toast('Welcome to the Editorial Desk', 'ok');
  refreshList();
}
async function doLogout() { await sb.auth.signOut(); location.reload(); }

// ── BREAKING TOGGLE ─────────────────────────────
function onBreaking() {
  const on = document.getElementById('f-breaking').checked;
  document.getElementById('breaking-row').classList.toggle('on', on);
}

// ── IMAGE UPLOAD ────────────────────────────────
async function uploadImg() {
  const file = document.getElementById('f-imgfile').files[0];
  const el = document.getElementById('up-status');
  if (!file) return;
  el.innerHTML = '<span class="up-status uploading">⟳ Uploading…</span>';
  const fd = new FormData(); fd.append('image', file);
  try {
    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IBB_KEY}`, { method:'POST', body:fd });
    const j = await r.json();
    if (j.success) {
      document.getElementById('f-imgurl').value = j.data.url;
      el.innerHTML = '<span class="up-status ok">✓ Image uploaded</span>';
      toast('Image uploaded', 'ok');
    } else throw 0;
  } catch { el.innerHTML = '<span class="up-status fail">✗ Upload failed — paste URL manually</span>'; }
}

// ── SLUG ────────────────────────────────────────
function autoSlug() {
  if (document.getElementById('pid').value) return;
  const s = document.getElementById('f-title').value
    .toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,60);
  document.getElementById('f-slug').value = s;
  updateSlugHint();
}
function updateSlugHint() {
  document.getElementById('slug-hint').textContent = 'article.html?id=' + document.getElementById('f-slug').value;
}

// ── SAVE ────────────────────────────────────────
async function savePost() {
  const id      = document.getElementById('pid').value;
  const title   = document.getElementById('f-title').value.trim();
  const slug    = document.getElementById('f-slug').value.trim();
  const content = document.getElementById('f-content').value.trim();
  if (!title || !slug || !content) { toast('Title, slug and content are required.','err'); return; }

  const payload = {
    title, slug, content,
    excerpt:   document.getElementById('f-excerpt').value.trim() || null,
    image_url: document.getElementById('f-imgurl').value.trim()  || null,
    category:  document.getElementById('f-cat').value             || null,
    author:    document.getElementById('f-author').value.trim()   || 'Alamin Gazette Staff',
    breaking:  document.getElementById('f-breaking').checked,
    is_published: true
  };

  const btn = document.getElementById('save-btn');
  const lbl = document.getElementById('save-label');
  btn.disabled=true; lbl.textContent='Saving…';

  const res = id
    ? await sb.from('posts').update(payload).eq('id', id)
    : await sb.from('posts').insert([payload]);

  btn.disabled=false; lbl.textContent = id ? 'Update Article' : 'Publish Article';

  if (res.error) { toast(res.error.message,'err'); return; }
  toast(id ? 'Article updated!' : 'Article published!', 'ok');
  resetForm(); refreshList();
}

// ── DELETE ──────────────────────────────────────
async function deletePost(id, title) {
  if (!confirm(`Delete "${title}"?\n\nThis cannot be undone.`)) return;
  const { error } = await sb.from('posts').delete().eq('id', id);
  if (error) toast('Delete failed: ' + error.message, 'err');
  else { toast('Article deleted'); refreshList(); }
}

// ── EDIT ────────────────────────────────────────
function startEdit(p) {
  document.getElementById('ep-title').textContent = 'Edit Article';
  document.getElementById('save-label').textContent = 'Update Article';
  document.getElementById('pid').value           = p.id;
  document.getElementById('f-title').value       = p.title;
  document.getElementById('f-slug').value        = p.slug;
  document.getElementById('f-imgurl').value      = p.image_url  || '';
  document.getElementById('f-content').value     = p.content;
  document.getElementById('f-cat').value         = p.category   || '';
  document.getElementById('f-author').value      = p.author     || '';
  document.getElementById('f-excerpt').value     = p.excerpt    || '';
  document.getElementById('f-breaking').checked  = !!p.breaking;
  document.getElementById('up-status').innerHTML = '';
  onBreaking(); updateSlugHint();
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── RESET ────────────────────────────────────────
function resetForm() {
  document.getElementById('ep-title').textContent = 'New Article';
  document.getElementById('save-label').textContent = 'Publish Article';
  ['pid','f-title','f-slug','f-imgurl','f-content','f-author','f-excerpt']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-cat').value = '';
  document.getElementById('f-breaking').checked = false;
  document.getElementById('f-imgfile').value = '';
  document.getElementById('up-status').innerHTML = '';
  document.getElementById('slug-hint').textContent = 'article.html?id=';
  onBreaking();
}

// ── LIST ─────────────────────────────────────────
function chipClass(c) {
  return {'World Affairs':'chip-world','Economy & Markets':'chip-economy',
    'Innovation':'chip-innovation','Defense & Security':'chip-defense','Society':'chip-society'}[c]||'chip-default';
}

function formatPublished(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function renderList(posts) {
  const el = document.getElementById('post-list');
  if (!posts.length) {
    el.innerHTML = '<div style="text-align:center;padding:44px;color:var(--ink-3);font-size:13px;">No articles found.</div>';
    return;
  }
  el.innerHTML = posts.map(p => `
    <div class="post-row">
      <img class="post-thumb"
        src="${p.image_url||'https://placehold.co/56x42/cfc8bb/8a7a6a?text=+'}"
        onerror="this.src='https://placehold.co/56x42/cfc8bb/8a7a6a?text=+'" alt="">
      <div class="post-info">
        <h4>
          ${p.breaking ? '<span class="breaking-indicator"></span> ' : ''}${p.title}
        </h4>
        <div class="pmeta">
          ${p.category ? `<span class="cat-mini ${chipClass(p.category)}">${p.category}</span>` : ''}
          <span>${p.author||'Alamin Gazette'}</span>
          <span>${formatPublished(p.created_at)}</span>
        </div>
      </div>
      <div class="post-actions">
        <button class="btn btn-ghost btn-sm" onclick='startEdit(${JSON.stringify(p).replace(/'/g,"&apos;")})'>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}','${p.title.replace(/'/g,"\\'")}')">Del</button>
      </div>
    </div>`).join('');
}

async function refreshList() {
  const { data } = await sb.from('posts').select('*').order('created_at',{ascending:false});
  allPosts = data || [];
  document.getElementById('post-count').textContent =
    `${allPosts.length} article${allPosts.length !== 1 ? 's' : ''}`;
  renderList(allPosts);
}

function filterList() {
  const q = document.getElementById('search').value.toLowerCase();
  renderList(allPosts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    (p.author||'').toLowerCase().includes(q) ||
    (p.category||'').toLowerCase().includes(q)
  ));
}
</script>
</body>
</html>
