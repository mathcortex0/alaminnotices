<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Alamin Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --text: #212529; --primary: #007bff; --danger: #dc3545; --warn: #ffc107; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.5rem; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid #ddd; margin-top: 10px; }
        .post-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .post-info { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .actions { display: flex; gap: 5px; }
        .mini-btn { padding: 6px 10px; font-size: 12px; width: auto; }
        .hidden { display: none; }
        #status-msg { font-size: 14px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section" class="card">
            <h2>Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Supabase Password">
            <button class="btn-primary" onclick="handleLogin()">Login to Dashboard</button>
        </div>

        <div id="editor-section" class="card hidden">
            <h2 id="editor-title">New Article</h2>
            <input type="hidden" id="post-id">
            
            <label>1. Upload Image</label>
            <input type="file" id="img-file" accept="image/*" onchange="uploadToImgBB()">
            <div id="status-msg"></div>
            <input type="text" id="img-url" placeholder="Image URL (Auto-fills)" readonly>
            
            <label>2. Article Details</label>
            <input type="text" id="post-title" placeholder="Title">
            <input type="text" id="post-slug" placeholder="url-slug-example">
            <textarea id="post-content" rows="8" placeholder="Write your content..."></textarea>
            
            <button class="btn-primary" id="save-btn" onclick="saveToSupabase()">Publish Article</button>
            <button class="btn-outline" onclick="resetForm()">Cancel / New</button>
        </div>

        <div id="list-section" class="card hidden">
            <h3>Manage All Posts</h3>
            <div id="post-list">Fetching posts...</div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://szzqaqwpvxwrefkojplh.supabase.co';
        const SUPA_KEY = 'sb_publishable_xthiJ5eahaJU5w7kGDaY_A_vIwODkTa';
        const IBB_KEY = '5eedf24deee3528bc34e811052972c74';
        const _supabase = supabase.createClient(SUPA_URL, SUPA_KEY);

        async function handleLogin() {
            const pass = document.getElementById('admin-pass').value;
            const { error } = await _supabase.auth.signInWithPassword({ 
                email: 'text.me.md.alamin@gmail.com', password: pass 
            });
            if (error) return alert("Wrong Password");
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('editor-section').classList.remove('hidden');
            document.getElementById('list-section').classList.remove('hidden');
            refreshList();
        }

        async function uploadToImgBB() {
            const file = document.getElementById('img-file').files[0];
            const msg = document.getElementById('status-msg');
            if (!file) return;

            msg.innerText = "Uploading to ImgBB...";
            msg.style.color = "blue";

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IBB_KEY}`, { method: 'POST', body: formData });
                const json = await res.json();
                if (json.success) {
                    document.getElementById('img-url').value = json.data.url;
                    msg.innerText = "Upload Successful!";
                    msg.style.color = "green";
                }
            } catch (e) { msg.innerText = "Upload Failed"; msg.style.color = "red"; }
        }

        async function refreshList() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            document.getElementById('post-list').innerHTML = data.map(p => `
                <div class="post-item">
                    <div class="post-info">${p.title}</div>
                    <div class="actions">
                        <button class="mini-btn btn-primary" onclick='startEdit(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Edit</button>
                        <button class="mini-btn" style="background:#ddd" onclick="deletePost('${p.id}')">Del</button>
                    </div>
                </div>
            `).join('');
        }

        function startEdit(p) {
            document.getElementById('editor-title').innerText = "Edit Article";
            document.getElementById('save-btn').innerText = "Update Now";
            document.getElementById('post-id').value = p.id;
            document.getElementById('post-title').value = p.title;
            document.getElementById('post-slug').value = p.slug;
            document.getElementById('img-url').value = p.image_url;
            document.getElementById('post-content').value = p.content;
            window.scrollTo(0,0);
        }

        async function saveToSupabase() {
            const id = document.getElementById('post-id').value;
            const data = {
                title: document.getElementById('post-title').value,
                slug: document.getElementById('post-slug').value,
                image_url: document.getElementById('img-url').value,
                content: document.getElementById('post-content').value
            };

            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "Saving...";

            let res = id ? await _supabase.from('posts').update(data).eq('id', id) : await _supabase.from('posts').insert([data]);

            if (res.error) alert(res.error.message);
            else { alert("Done!"); resetForm(); refreshList(); }
            btn.disabled = false;
        }

        async function deletePost(id) {
            if (confirm("Delete this forever?")) {
                await _supabase.from('posts').delete().eq('id', id);
                refreshList();
            }
        }

        function resetForm() {
            document.getElementById('editor-title').innerText = "New Article";
            document.getElementById('save-btn').innerText = "Publish Article";
            document.getElementById('post-id').value = "";
            document.getElementById('post-title').value = "";
            document.getElementById('post-slug').value = "";
            document.getElementById('img-url').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('status-msg').innerText = "";
            document.getElementById('img-file').value = "";
        }
    </script>
</body>
</html>
