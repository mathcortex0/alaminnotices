<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; background: #f4f4f4; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="auth">
        <h2>Admin Login</h2>
        <input type="password" id="pass" placeholder="Enter Supabase Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="editor" class="hidden">
        <h2>Create Post</h2>
        <input type="text" id="t" placeholder="Article Title">
        <input type="text" id="s" placeholder="url-slug-here">
        <input type="text" id="i" placeholder="Third-party Image URL">
        <textarea id="c" rows="10" placeholder="Content text..."></textarea>
        <button id="pub" onclick="publish()">Publish Now</button>
    </div>

    <script>
        const supabaseUrl = 'https://szzqaqwpvxwrefkojplh.supabase.co';
        const supabaseKey = 'sb_publishable_xthiJ5eahaJU5w7kGDaY_A_vIwODkTa';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const { error } = await _supabase.auth.signInWithPassword({ 
                email: 'text.me.md.alamin@gmail.com', 
                password: document.getElementById('pass').value 
            });
            if (error) alert("Access Denied");
            else { 
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('editor').classList.remove('hidden');
            }
        }

        async function publish() {
            const btn = document.getElementById('pub');
            btn.disabled = true; btn.innerText = "Processing...";
            
            const { error } = await _supabase.from('posts').insert([{
                title: document.getElementById('t').value,
                slug: document.getElementById('s').value,
                image_url: document.getElementById('i').value,
                content: document.getElementById('c').value
            }]);

            if (error) alert("Error: " + error.message);
            else { alert("Success!"); location.reload(); }
        }
    </script>
</body>
</html>
